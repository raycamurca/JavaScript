<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <form action="">

            <h1>Login</h1>

            <div class="campo">
                <label for="iemail">Email</label>
                <input type="text" name="email" id="iemail" placeholder="email" required>
            </div>

            <div class="campo">
                <label for="isenha">Senha</label>
                <input type="text" name="senha" id="isenha" placeholder="senha" required minlength="5">
                <a href="#">
                    <p>Esqueceu a senha?</p>
                </a>
            </div>
            <button class="bt-enviar" type="submit">Entrar</button>

            <p>Não tem uma conta? <a href="#">Cadastra-se</a></p>
        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
