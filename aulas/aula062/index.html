<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class exercicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" class="form">
        <div class="div-input">
            <label for="inome">Nome</label>
            <input type="text" name="nome" id="inome">
        </div>

        <div class="div-input">
            <label for="iportas">Portas</label>
            <input type="number" name="portas" id="iportas" value="0">
        </div>

        <div class="div-input">
            <label for="iblidagem">Blidagem</label>
            <input type="number" name="blidagem" id="iblidagem" value="0">
        </div>

        <div class="div-input">
            <label for="imunicao">Munição</label>
            <input type="number" name="municao" id="imunicao" value="0">
        </div>

        <div class="div-input-tipo">
            <p>TIPO</p>
            <div>
                <input type="radio" name="tipo-carro" id="normal" value="normal">
                <label for="normal">Normal</label>
            </div>
            <div>
                <input type="radio" name="tipo-carro" id="militar" value="militar">
                <label for="militar">Militar</label>
            </div>
        </div>

        <button type="submit" class="adicionar">Adicionar</button>
        <div class="resp">
            <h2>Carros Adicionados</h2>
        </div>
        <button class="remove">Remover Selecionado</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
