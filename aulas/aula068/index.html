<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="calc" id="calc">
        <div class="div-nome">
            <h1>Calculadora</h1>
        </div>

        <div class="div-display" id="div-display">
            <p id="display">0</p>
        </div>

        <div class="div-teclas" id="div-teclas">
            <div>
                <button class="tecla" id="t7">7</button>
                <button class="tecla" id="t8">8</button>
                <button class="tecla" id="t9">9</button>
                <button class="tecla" id="t+">+</button>
            </div>
            <div>
                <button class="tecla" id="t4">4</button>
                <button class="tecla" id="t5">5</button>
                <button class="tecla" id="t6">6</button>
                <button class="tecla" id="t-">-</button>
            </div>
            <div>
                <button class="tecla" id="t1">1</button>
                <button class="tecla" id="t2">2</button>
                <button class="tecla" id="t3">3</button>
                <button class="tecla" id="tx">x</button>
            </div>
            <div>
                <button class="tecla" id="tvirgula">,</button>
                <button class="tecla" id="t0">0</button>
                <button class="tecla" id="td">/</button>
                <button class="tecla" id="tigual">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
