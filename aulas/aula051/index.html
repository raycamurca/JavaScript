<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="conteiner">
        <div>
            <label for="valor1">1° Número</label>
            <input type="number" name="numero1" id="valor1">
        </div>
        <div>
            <label for="valor2">2° Número</label>
            <input type="number" name="numero2" id="valor2">
        </div>
        <div class="resp">Resultado: </div>
        <div class="bts">
            <button class="btsoma">+</button>
            <button class="btmenos">-</button>
            <button class="btvezes">x</button>
            <button class="btdivisao">/</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
